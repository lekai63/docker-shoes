name: Build Docker Image
permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Shoes version to build (e.g., v0.2.7)"
        required: true
        default: "v0.2.7"
      config:
        description: "Config file under config/ without .yaml"
        required: true
        default: "render"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download musl binary
        run: |
          set -euo pipefail

          release_tag="${{ github.event.inputs.version }}"
          asset_name="shoes-x86_64-unknown-linux-musl.tar.gz"
          asset_url="https://github.com/cfal/shoes/releases/download/${release_tag}/${asset_name}"

          echo "Downloading ${asset_url}"
          curl -fL "${asset_url}" -o "${asset_name}"
          tar -xzf "${asset_name}"
          chmod +x shoes

      - name: Prepare config
        run: |
          set -euo pipefail

          config_name="${{ github.event.inputs.config }}"
          config_path="config/${config_name}.yaml"

          if [ ! -f "${config_path}" ]; then
            echo "Config file not found: ${config_path}" >&2
            exit 1
          fi

          cp "${config_path}" config.yaml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ github.event.inputs.version }}
            BINARY_NAME=shoes
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.event.inputs.version }}
