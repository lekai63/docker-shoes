# The default value of PORT is 10000
# https://render.com/docs/web-services#port-binding
# 否则需要在render 的环境变量中指定 PORT（5555）
# render 15分钟没流量就关闭
- address: 0.0.0.0:5555
  transport: tcp
  protocol:
    type: ws
    targets:
      - matching_path: /vv
        matching_headers:
          host: "docker-shoes-render.onrender.com"
        protocol:
          type: vmess
          cipher: any
          user_id: 969171c6-0691-478e-8223-564fa2770cf1
          force_aead: false
          udp_enabled: false
  rules:
    # allow connections to all ips
    - mask: 0.0.0.0/0
      action: allow
      client_proxy: direct
