# An HTTP server (no TLS) that forwards connections via a SOCKS5 server.
- address: 0.0.0.0:8080
  transport: tcp
  protocol:
    type: http
    # username: secretuser
    # password: secretpass
  rules:
    - mask: 0.0.0.0/0
      action: allow
      client_proxy:
        - address: docker-shoes-render.onrender.com:443
          protocol:
            type: tls
            verify: false
            sni_hostname: docker-shoes-render.onrender.com
            protocol:
              type: ws
              matching_path: /vv
              matching_headers:
                host: "docker-shoes-render.onrender.com"
              protocol:
                type: vmess
                cipher: any
                user_id: 969171c6-0691-478e-8223-564fa2770cf1
                force_aead: false
                udp_enabled: false
